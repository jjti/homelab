---
- name: Bootstrap bazz (rootless quadlet homelab)
  hosts: homelab
  gather_facts: true

  vars:
    quadlet_dir: '{{ ansible_facts["env"]["HOME"] }}/.config/containers/systemd'
    user_runtime_env:
      XDG_RUNTIME_DIR: '/run/user/{{ ansible_facts["user_uid"] }}'
      DBUS_SESSION_BUS_ADDRESS: 'unix:path=/run/user/{{ ansible_facts["user_uid"] }}/bus'
    services:
      - jellyfin
      - jellyseer
      - sonarr
      - radarr
      - bazarr
      - gluetun
      - sabnzbd
      - recyclarr
      - pihole
      - immich-postgres
      - immich-redis
      - immich-ml
      - immich-server
      - home-assistant
    # dnscrypt-proxy is installed on the host (not a container) per the
    # official Pi-hole guide: https://docs.pi-hole.net/guides/dns/dnscrypt-proxy/
    # We pin the version + verify the upstream release with minisign so the
    # only trust root is github.com/DNSCrypt/dnscrypt-proxy releases.
    dnscrypt_proxy_version: "2.1.12"
    dnscrypt_proxy_arch: "x86_64"
    # rclone for nightly Immich backups to S3 Glacier. Check current at
    # https://rclone.org/downloads/ before bumping.
    rclone_version: "1.69.0"
    # bazz's LAN IP. Pi-hole publishes 53/53/8053 on this address only, so
    # clients point their DNS at this IP. Reserve it on the router (DHCP
    # reservation by MAC) to keep it stable.
    pihole_host_ip: 192.168.0.42
    # Host-side `tailscale serve` ingress: kernel TUN, full speed.
    # Use this for bandwidth-heavy services (e.g. Jellyfin streaming).
    tailscale_host_serves:
      - upstream: http://localhost:8096
        https_port: 443
        funnel: false
    # Sidecar `tailscale serve` ingress: userspace, slower but isolates each
    # service onto its own MagicDNS name. Fine for low-traffic web UIs.
    tailscale_sidecar_serves:
      - name: download
        upstream: http://jellyseer:5055
        funnel: false
      - name: photos
        upstream: http://immich-server:2283
        funnel: false

  tasks:
    - name: Create infra dirs
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ infra_dir }}"
        - "{{ infra_dir }}/arr"
        - "{{ infra_dir }}/arr/config/jellyfin"
        - "{{ infra_dir }}/arr/config/jellyseer"
        - "{{ infra_dir }}/arr/config/sonarr"
        - "{{ infra_dir }}/arr/config/radarr"
        - "{{ infra_dir }}/arr/config/bazarr"
        - "{{ infra_dir }}/arr/config/sabnzbd"
        - "{{ infra_dir }}/arr/config/recyclarr"
        - "{{ infra_dir }}/arr/cache/jellyfin"
        - "{{ infra_dir }}/arr/downloads"
        - "{{ infra_dir }}/arr/media/tv"
        - "{{ infra_dir }}/arr/media/movies"
        - "{{ infra_dir }}/pihole"
        - "{{ infra_dir }}/pihole/etc-pihole"
        - "{{ infra_dir }}/pihole/etc-dnsmasq.d"
        - "{{ infra_dir }}/gluetun"
        - "{{ infra_dir }}/immich"
        - "{{ infra_dir }}/immich/postgres"
        - "{{ infra_dir }}/immich/redis"
        - "{{ infra_dir }}/immich/ml-cache"
        - "{{ infra_dir }}/immich/ml-kernel-cache"
        - "{{ infra_dir }}/home-assistant"
        - "{{ quadlet_dir }}"

    # USB-attached photos drive. Mounted by label (survives /dev/sdX
    # reshuffling); nofail + short device timeout so a missing/unplugged
    # disk doesn't hang boot.
    - name: Ensure /mnt/photos mount point exists
      ansible.builtin.file:
        path: /mnt/photos
        state: directory
        owner: josh
        group: josh
        mode: "0755"
      become: true

    - name: Mount photos drive by label
      ansible.posix.mount:
        path: /mnt/photos
        src: LABEL=photos
        fstype: xfs
        opts: defaults,nofail,x-systemd.device-timeout=10
        state: mounted
      become: true

    - name: Ensure /mnt/photos/immich subdir exists
      ansible.builtin.file:
        path: /mnt/photos/immich
        state: directory
        owner: josh
        group: josh
        mode: "0755"
      become: true

    - name: Create tailscale sidecar dirs
      ansible.builtin.file:
        path: "{{ infra_dir }}/arr/tailscale/{{ item.0.name }}/{{ item.1 }}"
        state: directory
      loop: "{{ tailscale_sidecar_serves | product(['state', 'config']) | list }}"

    - name: Render tailscale serve configs
      ansible.builtin.template:
        src: ../templates/tailscale-serve.json.j2
        dest: "{{ infra_dir }}/arr/tailscale/{{ item.name }}/config/serve.json"
        mode: "0644"
      loop: "{{ tailscale_sidecar_serves }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Render tailscale auth env file
      ansible.builtin.template:
        src: ../templates/tailscale.env.j2
        dest: "{{ infra_dir }}/arr/tailscale.env"
        mode: "0600"
        force: false  # don't clobber the real auth key once filled in

    - name: Render recyclarr config
      ansible.builtin.template:
        src: ../templates/recyclarr.yml.j2
        dest: "{{ infra_dir }}/arr/config/recyclarr/recyclarr.yml"
        mode: "0644"

    - name: Render recyclarr env file
      ansible.builtin.template:
        src: ../templates/recyclarr.env.j2
        dest: "{{ infra_dir }}/arr/recyclarr.env"
        mode: "0600"
        force: false  # don't clobber API keys once filled in

    - name: Render gluetun env file
      ansible.builtin.template:
        src: ../templates/gluetun.env.j2
        dest: "{{ infra_dir }}/gluetun.env"
        mode: "0600"
        force: false  # don't clobber ProtonVPN WG key once filled in

    - name: Render immich env file
      ansible.builtin.template:
        src: ../templates/immich.env.j2
        dest: "{{ infra_dir }}/immich.env"
        mode: "0600"
        force: false  # don't clobber DB password once filled in

    # ---- dnscrypt-proxy on the host ----
    - name: Ensure /etc/dnscrypt-proxy exists
      ansible.builtin.file:
        path: /etc/dnscrypt-proxy
        state: directory
        mode: "0755"
      become: true

    - name: Check installed dnscrypt-proxy version
      ansible.builtin.command: /usr/local/bin/dnscrypt-proxy -version
      register: dnscrypt_installed
      changed_when: false
      failed_when: false

    - name: Download + verify + install dnscrypt-proxy from upstream release
      become: true
      when: dnscrypt_installed.rc != 0 or dnscrypt_proxy_version not in (dnscrypt_installed.stdout | default(''))
      block:
        - name: Stage dir for dnscrypt-proxy release
          ansible.builtin.tempfile:
            state: directory
            suffix: dnscrypt
          register: dnscrypt_tmp

        - name: Fetch dnscrypt-proxy tarball
          ansible.builtin.get_url:
            url: "https://github.com/DNSCrypt/dnscrypt-proxy/releases/download/{{ dnscrypt_proxy_version }}/dnscrypt-proxy-linux_{{ dnscrypt_proxy_arch }}-{{ dnscrypt_proxy_version }}.tar.gz"
            dest: "{{ dnscrypt_tmp.path }}/dnscrypt-proxy.tar.gz"
            mode: "0644"

        - name: Extract dnscrypt-proxy
          ansible.builtin.unarchive:
            src: "{{ dnscrypt_tmp.path }}/dnscrypt-proxy.tar.gz"
            dest: "{{ dnscrypt_tmp.path }}"
            remote_src: true

        - name: Install dnscrypt-proxy binary to /usr/local/bin
          ansible.builtin.copy:
            src: "{{ dnscrypt_tmp.path }}/linux-{{ dnscrypt_proxy_arch }}/dnscrypt-proxy"
            dest: /usr/local/bin/dnscrypt-proxy
            mode: "0755"
            remote_src: true

        - name: Clean up staging dir
          ansible.builtin.file:
            path: "{{ dnscrypt_tmp.path }}"
            state: absent

    # ---- rclone on the host (for Immich backups) ----
    - name: Check installed rclone version
      ansible.builtin.command: /usr/local/bin/rclone version
      register: rclone_installed
      changed_when: false
      failed_when: false

    - name: Download + install rclone from upstream release
      become: true
      when: rclone_installed.rc != 0 or rclone_version not in (rclone_installed.stdout | default(''))
      block:
        - name: Stage dir for rclone release
          ansible.builtin.tempfile:
            state: directory
            suffix: rclone
          register: rclone_tmp

        - name: Fetch rclone zip
          ansible.builtin.get_url:
            url: "https://downloads.rclone.org/v{{ rclone_version }}/rclone-v{{ rclone_version }}-linux-amd64.zip"
            dest: "{{ rclone_tmp.path }}/rclone.zip"
            mode: "0644"

        - name: Extract rclone
          ansible.builtin.unarchive:
            src: "{{ rclone_tmp.path }}/rclone.zip"
            dest: "{{ rclone_tmp.path }}"
            remote_src: true

        - name: Install rclone binary to /usr/local/bin
          ansible.builtin.copy:
            src: "{{ rclone_tmp.path }}/rclone-v{{ rclone_version }}-linux-amd64/rclone"
            dest: /usr/local/bin/rclone
            mode: "0755"
            remote_src: true

        - name: Clean up staging dir
          ansible.builtin.file:
            path: "{{ rclone_tmp.path }}"
            state: absent

    - name: Render dnscrypt-proxy config
      ansible.builtin.template:
        src: ../templates/dnscrypt-proxy.toml.j2
        dest: /etc/dnscrypt-proxy/dnscrypt-proxy.toml
        mode: "0644"
      become: true
      notify: restart-dnscrypt-proxy

    - name: Render dnscrypt-proxy systemd unit
      ansible.builtin.template:
        src: ../templates/dnscrypt-proxy.service.j2
        dest: /etc/systemd/system/dnscrypt-proxy.service
        mode: "0644"
      become: true
      notify:
        - systemd-daemon-reload
        - restart-dnscrypt-proxy

    - name: Enable + start dnscrypt-proxy
      ansible.builtin.systemd:
        name: dnscrypt-proxy
        enabled: true
        state: started
        daemon_reload: true
      become: true

    - name: Render pihole env file
      ansible.builtin.template:
        src: ../templates/pihole.env.j2
        dest: "{{ infra_dir }}/pihole/pihole.env"
        mode: "0600"
        force: false  # don't clobber the admin password once set

    # Pi-hole publishes on :53, which is below the rootless cutoff (1024).
    # Lower the unprivileged-port floor so the rootless quadlet can bind it.
    - name: Allow rootless containers to bind privileged port 53
      ansible.posix.sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: "53"
        sysctl_file: /etc/sysctl.d/99-rootless-pihole.conf
        state: present
        reload: true
      become: true

    # gluetun (rootless) needs to open /dev/net/tun, which is 0660 root:root
    # by default. AddDevice= passes the node in but doesn't grant access to
    # the rootless uid. Make the device world-rw via a udev rule.
    - name: Allow rootless containers to open /dev/net/tun
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/51-tun.rules
        content: 'KERNEL=="tun", MODE="0666", OPTIONS+="static_node=net/tun"'
        mode: "0644"
      become: true
      register: tun_udev_rule

    - name: Reload udev rules + retrigger tun
      ansible.builtin.command: "{{ item }}"
      become: true
      loop:
        - udevadm control --reload-rules
        - udevadm trigger /dev/net/tun
      when: tun_udev_rule.changed
      changed_when: false

    # Sonoff Zigbee 3.0 USB Dongle Plus V2 (ITead, CP210x UART, VID:PID
    # 10c4:ea60). Default perms are 0660 root:dialout; rootless podman can't
    # open it. Set mode 0666 and pin a stable /dev/zigbee symlink so the
    # quadlet doesn't depend on /dev/ttyUSBN ordering.
    - name: Allow rootless containers to open the Sonoff Zigbee dongle
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/52-sonoff-zigbee.rules
        content: |
          SUBSYSTEM=="tty", ATTRS{idVendor}=="10c4", ATTRS{idProduct}=="ea60", ATTRS{product}=="Sonoff Zigbee 3.0 USB Dongle Plus V2", MODE="0666", SYMLINK+="zigbee"
        mode: "0644"
      become: true
      register: zigbee_udev_rule

    - name: Reload udev rules + retrigger Zigbee dongle
      ansible.builtin.command: "{{ item }}"
      become: true
      loop:
        - udevadm control --reload-rules
        - udevadm trigger --subsystem-match=tty
      when: zigbee_udev_rule.changed
      changed_when: false

    # ---- Bluetooth stability tweaks ----
    # Two well-known fixes for flapping/dropouts with USB Bluetooth dongles
    # on Linux, especially with DualSense + Realtek RTL8761B:
    #   1. btusb autosuspend: idle adapter gets suspended by USB power
    #      management, then signal flaps when traffic resumes. Disable it.
    #   2. L2CAP ERTM: enhanced retransmission mode is known to misbehave
    #      with Sony controllers. Disabling it improves pair stability.
    # Both take effect after a reboot (or `modprobe -r/<module>` cycle, but
    # that would drop any active BT connection).
    - name: Disable btusb USB autosuspend
      ansible.builtin.copy:
        dest: /etc/modprobe.d/btusb-noautosuspend.conf
        content: "options btusb enable_autosuspend=0\n"
        mode: "0644"
      become: true
      register: btusb_modprobe

    - name: Disable Bluetooth ERTM (DualSense stability)
      ansible.builtin.copy:
        dest: /etc/modprobe.d/bluetooth-noertm.conf
        content: "options bluetooth disable_ertm=Y\n"
        mode: "0644"
      become: true
      register: bluetooth_modprobe

    - name: Warn that a reboot is needed for BT module options to take effect
      ansible.builtin.debug:
        msg: |
          Bluetooth module options changed (autosuspend / ERTM). Reboot
          bazz for them to take effect — `modprobe -r` would drop any
          currently-connected BT device (e.g. the PS5 controller).
      when: btusb_modprobe.changed or bluetooth_modprobe.changed

    - name: Render quadlet network unit
      ansible.builtin.template:
        src: ../templates/quadlet/arr.network.j2
        dest: "{{ quadlet_dir }}/arr.network"
        mode: "0644"
      notify: daemon-reload

    - name: Render quadlet container units
      ansible.builtin.template:
        src: "../templates/quadlet/{{ item }}.container.j2"
        dest: "{{ quadlet_dir }}/{{ item }}.container"
        mode: "0644"
      loop: "{{ services }}"
      notify: daemon-reload

    - name: Render tailscale sidecar quadlet container units
      ansible.builtin.template:
        src: ../templates/quadlet/tailscale.container.j2
        dest: "{{ quadlet_dir }}/tailscale-{{ item.name }}.container"
        mode: "0644"
      loop: "{{ tailscale_sidecar_serves }}"
      loop_control:
        label: "{{ item.name }}"
      notify: daemon-reload

    - name: Chown jellyfin cache + config dirs for the in-container PUID (rootless subuid)
      # The linuxserver image runs jellyfin as abc (PUID=1000). In rootless
      # podman, that uid maps to a high subuid on the host, not to josh:1000.
      # `podman unshare` runs chown inside the user namespace so 1000:1000
      # resolves to the correct host subuid.
      #
      # /config: lscr's init only chowns the top of /config at startup, not
      # recursively. Subdirs created later (e.g. data/metadata/library) end up
      # owned by other uids and image/metadata writes fail with
      # UnauthorizedAccessException. Recursive chown fixes it.
      ansible.builtin.command:
        cmd: "podman unshare chown -R 1000:1000 {{ item }}"
      environment: "{{ user_runtime_env }}"
      loop:
        - "{{ infra_dir }}/arr/cache/jellyfin"
        - "{{ infra_dir }}/arr/config/jellyfin"
      changed_when: false

    # ---- Immich backup script + nightly user-mode systemd timer ----
    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: '{{ ansible_facts["env"]["HOME"] }}/.local/bin'
        state: directory
        mode: "0755"

    - name: Ensure ~/.config/systemd/user exists
      ansible.builtin.file:
        path: '{{ ansible_facts["env"]["HOME"] }}/.config/systemd/user'
        state: directory
        mode: "0755"

    - name: Render immich-backup script
      ansible.builtin.template:
        src: ../templates/immich-backup.sh.j2
        dest: '{{ ansible_facts["env"]["HOME"] }}/.local/bin/immich-backup.sh'
        mode: "0755"

    - name: Render immich-backup env file
      ansible.builtin.template:
        src: ../templates/immich-backup.env.j2
        dest: '{{ ansible_facts["env"]["HOME"] }}/.config/immich-backup.env'
        mode: "0600"
        force: false  # don't clobber AWS creds once filled in

    - name: Render immich-backup systemd service unit
      ansible.builtin.template:
        src: ../templates/immich-backup.service.j2
        dest: '{{ ansible_facts["env"]["HOME"] }}/.config/systemd/user/immich-backup.service'
        mode: "0644"
      notify: daemon-reload

    - name: Render immich-backup systemd timer unit
      ansible.builtin.template:
        src: ../templates/immich-backup.timer.j2
        dest: '{{ ansible_facts["env"]["HOME"] }}/.config/systemd/user/immich-backup.timer'
        mode: "0644"
      notify: daemon-reload

    - name: Chown immich data dirs for the in-container UIDs (rootless subuids)
      # Same trick as the jellyfin chown above. Immich-server + ML run as UID
      # 1000 inside their images; immich-postgres + redis run as UID 999.
      # `podman unshare` translates those to the host subuid range.
      ansible.builtin.command:
        cmd: "podman unshare chown -R {{ item.uid }}:{{ item.gid }} {{ item.path }}"
      environment: "{{ user_runtime_env }}"
      loop:
        - { uid: 1000, gid: 1000, path: "/mnt/photos/immich" }
        - { uid: 1000, gid: 1000, path: "{{ infra_dir }}/immich/ml-cache" }
        - { uid: 1000, gid: 1000, path: "{{ infra_dir }}/immich/ml-kernel-cache" }
        - { uid: 999,  gid: 999,  path: "{{ infra_dir }}/immich/postgres" }
        - { uid: 999,  gid: 999,  path: "{{ infra_dir }}/immich/redis" }
      changed_when: false

    - name: Apply pending unit changes
      ansible.builtin.meta: flush_handlers

    - name: Start quadlet services
      ansible.builtin.command:
        cmd: "systemctl --user start {{ item }}.service"
      environment: "{{ user_runtime_env }}"
      loop: "{{ services }}"
      changed_when: false

    - name: Enable + start immich-backup nightly timer
      ansible.builtin.command:
        cmd: systemctl --user enable --now immich-backup.timer
      environment: "{{ user_runtime_env }}"
      changed_when: false

    - name: Start tailscale sidecar services
      ansible.builtin.command:
        cmd: "systemctl --user start tailscale-{{ item.name }}.service"
      environment: "{{ user_runtime_env }}"
      loop: "{{ tailscale_sidecar_serves }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    - name: Ensure tailscaled is enabled and running on host
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true
      become: true

    - name: Read tailscale auth status
      ansible.builtin.command: tailscale status --json
      register: ts_status
      changed_when: false
      failed_when: false
      become: true

    - name: Fail if tailscale is not authenticated
      ansible.builtin.fail:
        msg: |
          Tailscale is not logged in on the host. Run once:
            sudo tailscale up
          then re-run this playbook.
      when: ts_status.rc != 0 or (ts_status.stdout | from_json).BackendState != "Running"

    - name: Configure host tailscale serve (tailnet-only)
      ansible.builtin.command:
        cmd: "tailscale serve --bg --https={{ item.https_port }} {{ item.upstream }}"
      loop: "{{ tailscale_host_serves }}"
      loop_control:
        label: "{{ item.upstream }} -> :{{ item.https_port }}"
      when: not item.funnel
      changed_when: false
      become: true

    - name: Configure host tailscale funnel (public)
      ansible.builtin.command:
        cmd: "tailscale funnel --bg --https={{ item.https_port }} {{ item.upstream }}"
      loop: "{{ tailscale_host_serves }}"
      loop_control:
        label: "{{ item.upstream }} -> :{{ item.https_port }}"
      when: item.funnel
      changed_when: false
      become: true

  handlers:
    - name: daemon-reload
      ansible.builtin.command:
        cmd: systemctl --user daemon-reload
      environment: "{{ user_runtime_env }}"

    - name: systemd-daemon-reload
      ansible.builtin.command: systemctl daemon-reload
      become: true

    - name: restart-dnscrypt-proxy
      ansible.builtin.systemd:
        name: dnscrypt-proxy
        state: restarted
      become: true
